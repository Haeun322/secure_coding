{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>회원가입</h1>
  <form method="post" action="{{ url_for('auth.register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <label for="username">아이디</label>
      <input id="username" name="username" value="{{ form.username if form else '' }}"
             required minlength="3" maxlength="20" autocomplete="username">
      <small class="muted">영문/숫자/밑줄 3~20자</small>
    </div>
    <div class="form-row">
      <label for="display_name">표시 이름</label>
      <input id="display_name" name="display_name" value="{{ form.display_name if form else '' }}"
             required maxlength="30">
    </div>
    <div class="form-row">
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required
             minlength="8" maxlength="128" autocomplete="new-password">
      <small class="muted">8자 이상, 영문과 숫자 포함</small>
    </div>
    <button type="submit">가입하기</button>
  </form>
  <p class="muted">이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a></p>
</div>
{% endblock %}
