{% extends "base.html" %}
{% block title %}신고{% endblock %}
{% block content %}
<div class="card" style="max-width:460px;margin:0 auto;">
  <h1>{% if target_type == 'user' %}사용자{% else %}상품{% endif %} 신고</h1>
  <form method="post" action="{{ url_for('reports.create', target_type=target_type, target_id=target_id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <label for="reason">신고 사유</label>
      <textarea id="reason" name="reason" required maxlength="500"
                placeholder="구체적인 사유를 입력해 주세요."></textarea>
    </div>
    <button type="submit" class="danger">신고 접수</button>
  </form>
</div>
{% endblock %}
