{% extends "base.html" %}
{% block title %}송금 내역{% endblock %}
{% block content %}
<h1>전체 송금 내역</h1>
<table>
  <thead><tr><th>ID</th><th>보낸 사람</th><th>받는 사람</th><th>금액</th><th>메모</th><th>일시</th></tr></thead>
  <tbody>
    {% for t in transfers %}
      <tr>
        <td>{{ t['id'] }}</td>
        <td>{{ t['sender_name'] }}</td>
        <td>{{ t['receiver_name'] }}</td>
        <td>{{ '{:,}'.format(t['amount']) }}원</td>
        <td>{{ t['memo'] }}</td>
        <td>{{ t['created_at'] }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
