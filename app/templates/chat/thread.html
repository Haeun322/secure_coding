{% extends "base.html" %}
{% block title %}{{ other['display_name'] }} 님과의 대화{% endblock %}
{% block content %}
<h1>{{ other['display_name'] }} 님과의 대화</h1>
<p class="muted">상품:
  <a href="{{ url_for('products.detail', product_id=product['id']) }}">{{ product['title'] }}</a>
</p>

<div class="card">
  <div class="chat-log" data-chat-log
       data-product="{{ product['id'] }}" data-peer="{{ other['id'] }}" data-me="{{ me_id }}">
    {% for m in messages %}
      <div class="msg {% if m['sender_id'] == me_id %}mine{% endif %}" data-mid="{{ m['id'] }}">
        <div>{{ m['body'] }}</div>
        <div class="meta">{{ m['created_at'] }}</div>
      </div>
    {% else %}
      <p class="muted chat-empty">첫 메시지를 보내 보세요.</p>
    {% endfor %}
  </div>

  <form method="post" action="{{ url_for('chat.thread', product_id=product['id'], peer_id=other['id']) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <textarea name="body" required maxlength="1000" placeholder="메시지 입력" class="ta-sm"></textarea>
    </div>
    <button type="submit">보내기</button>
  </form>
</div>
{% endblock %}
